<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinFeed 数据可视化大屏</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
:root,[data-theme="dark"]{
  --bg:#0d1117;--bg-card:#161b22;--bg-card-alt:#1c2128;--bg-hover:#1c2333;
  --text:#e6edf3;--text2:#9ba5b2;--text3:#6e7681;
  --border:#30363d;--border2:#484f58;
  --accent:#58a6ff;--accent-h:#79c0ff;--accent-bg:rgba(88,166,255,.1);
  --green:#3fb950;--green-bg:rgba(63,185,80,.1);
  --red:#f85149;--red-bg:rgba(248,81,73,.1);
  --orange:#d29922;--orange-bg:rgba(210,153,34,.1);
  --purple:#bc8cff;--purple-bg:rgba(188,140,255,.1);
  --shadow:0 1px 3px rgba(0,0,0,.3);--shadow-lg:0 4px 12px rgba(0,0,0,.4);
  --fs-xs:12px;--fs-sm:13px;--fs-base:15px;--fs-md:16px;--fs-lg:18px;--fs-xl:20px;
  --lh-base:1.7;
  --chart-axis:#6e7681;--chart-split:rgba(88,166,255,.08);
}
[data-theme="light"]{
  --bg:#f5f6f8;--bg-card:#ffffff;--bg-card-alt:#f0f1f3;--bg-hover:#eceef1;
  --text:#1a1d23;--text2:#4a5060;--text3:#7a8298;
  --border:#dde0e6;--border2:#cfd3da;
  --accent:#2563eb;--accent-h:#1d4ed8;--accent-bg:rgba(37,99,235,.08);
  --green:#16a34a;--green-bg:rgba(22,163,74,.08);
  --red:#dc2626;--red-bg:rgba(220,38,38,.08);
  --orange:#ea580c;--orange-bg:rgba(234,88,12,.08);
  --purple:#9333ea;--purple-bg:rgba(147,51,234,.08);
  --shadow:0 1px 3px rgba(0,0,0,.06);--shadow-lg:0 4px 12px rgba(0,0,0,.1);
  --fs-xs:12px;--fs-sm:13px;--fs-base:15px;--fs-md:16px;--fs-lg:18px;--fs-xl:20px;
  --lh-base:1.7;
  --chart-axis:#7a8298;--chart-split:rgba(37,99,235,.08);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: var(--bg);
    color: var(--text);
    font-family: "Microsoft YaHei","PingFang SC","Hiragino Sans GB","Noto Sans CJK SC","Source Han Sans CN","WenQuanYi Micro Hei",Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
}
.header {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 12px;
}
.header-left {
    display: flex;
    align-items: center;
    gap: 16px;
}
.header h1 {
    color: var(--accent);
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 2px;
    white-space: nowrap;
}
.header .subtitle {
    color: var(--text3);
    font-size: var(--fs-sm);
}
.header-center {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}
.header-right {
    display: flex;
    align-items: center;
    gap: 12px;
}
.back-btn {
    background: var(--bg-card-alt);
    color: var(--text2);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: var(--fs-xs);
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
}
.back-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
}
.theme-toggle {
    background: var(--bg-card-alt);
    color: var(--text2);
    border: 1px solid var(--border);
    width: 32px;
    height: 32px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.theme-toggle:hover {
    border-color: var(--accent);
    color: var(--accent);
}
.fullscreen-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: var(--fs-xs);
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 6px;
}
.fullscreen-btn:hover {
    opacity: .9;
}
.header-select {
    background: var(--bg-card-alt);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: var(--fs-xs);
    font-family: inherit;
    cursor: pointer;
    outline: none;
}
.header-select:focus {
    border-color: var(--accent);
}
.stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    padding: 16px 24px;
    max-width: 1800px;
    margin: 0 auto;
}
.stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    text-align: center;
}
.stat-card .number {
    font-size: 32px;
    font-weight: 700;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
}
.stat-card .label {
    color: var(--text2);
    font-size: var(--fs-sm);
    margin-top: 6px;
}
.stat-card .change {
    font-size: var(--fs-xs);
    margin-top: 4px;
}
.stat-card .change.up {
    color: var(--green);
}
.stat-card .change.down {
    color: var(--red);
}
.charts-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 16px;
    padding: 16px 24px;
    max-width: 1800px;
    margin: 0 auto;
}
.chart-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    height: 340px;
}
.chart-box h3 {
    color: var(--text);
    font-size: var(--fs-base);
    font-weight: 600;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
}
.chart {
    width: 100%;
    height: calc(100% - 40px);
}
.news-section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 24px;
    margin: 16px 24px;
    max-width: 1800px;
}
.news-section .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
}
.news-section h3 {
    color: var(--text);
    font-size: var(--fs-lg);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
}
.news-section .view-all {
    color: var(--accent);
    font-size: var(--fs-xs);
    text-decoration: none;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
}
.news-section .view-all:hover {
    border-color: var(--accent);
    background: var(--accent-bg);
}
.news-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 14px;
}
.news-card {
    display: flex;
    gap: 12px;
    padding: 12px 14px;
    background: var(--bg-card-alt);
    border-radius: 6px;
    border: 1px solid transparent;
    transition: border-color 0.2s;
}
.news-card:hover {
    border-color: var(--border);
}
.news-card .news-indicator {
    width: 4px;
    flex-shrink: 0;
    border-radius: 2px;
    margin-top: 2px;
}
.news-card .news-indicator.high {
    background: var(--red);
}
.news-card .news-indicator.medium {
    background: var(--orange);
}
.news-card .news-indicator.low {
    background: var(--accent);
}
.news-card .news-content {
    flex: 1;
    min-width: 0;
}
.news-card .news-title {
    color: var(--text);
    font-size: var(--fs-sm);
    font-weight: 500;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 8px;
}
.news-card .news-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
}
.news-card .news-source {
    padding: 2px 8px;
    background: var(--accent-bg);
    color: var(--accent);
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
}
.news-card .news-time {
    color: var(--text3);
    font-size: var(--fs-xs);
    font-variant-numeric: tabular-nums;
}
.news-card .news-category {
    padding: 2px 8px;
    background: var(--bg-hover);
    color: var(--text2);
    border-radius: 4px;
    font-size: 11px;
}
.footer {
    text-align: center;
    padding: 12px;
    color: var(--text3);
    font-size: var(--fs-xs);
}
@media (min-width: 1920px) {
    .charts-grid {
        grid-template-columns: repeat(5, 1fr);
    }
    .stat-card .number {
        font-size: 36px;
    }
    .chart-box {
        height: 360px;
    }
}
@media (max-width: 1600px) {
    .charts-grid {
        grid-template-columns: repeat(3, 1fr);
    }
    .chart-box {
        height: 300px;
    }
}
@media (max-width: 1200px) {
    .charts-grid {
        grid-template-columns: repeat(2, 1fr);
    }
    .stat-card .number {
        font-size: 28px;
    }
}
@media (max-width: 768px) {
    .charts-grid {
        grid-template-columns: 1fr;
    }
    .stats-row {
        grid-template-columns: repeat(2, 1fr);
    }
    .stat-card {
        padding: 12px;
    }
    .stat-card .number {
        font-size: 24px;
    }
    .header {
        flex-direction: column;
        text-align: center;
    }
    .header-left, .header-center, .header-right {
        width: 100%;
        justify-content: center;
    }
    .header h1 {
        font-size: 20px;
    }
}
</style>
</head>
<body>
<div class="header">
    <div class="header-left">
        <a href="/" class="back-btn">&#8592; 返回主页</a>
        <h1>FinFeed 财经新闻数据大屏</h1>
    </div>
    <div class="header-center">
        <span class="subtitle" id="updateTime">加载中...</span>
    </div>
    <div class="header-right">
        <button class="fullscreen-btn" onclick="toggleFullscreen()" title="全屏显示">&#128468; 全屏</button>
        <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" title="切换主题">&#9790;</button>
    </div>
</div>

<div class="stats-row">
    <div class="stat-card">
        <div class="number" id="totalNews">0</div>
        <div class="label">新闻总数</div>
        <div class="change" id="totalChange"></div>
    </div>
    <div class="stat-card">
        <div class="number" id="total24h">0</div>
        <div class="label">24小时新增</div>
        <div class="change" id="hourlyChange"></div>
    </div>
    <div class="stat-card">
        <div class="number" id="sourceCount">0</div>
        <div class="label">信息来源</div>
    </div>
    <div class="stat-card">
        <div class="number" id="posRate">-</div>
        <div class="label">正面情绪占比</div>
    </div>
</div>

<div class="charts-grid">
    <div class="chart-box">
        <h3>📊 来源分布</h3>
        <div class="chart" id="sourceChart"></div>
    </div>
    <div class="chart-box">
        <h3>📈 发布趋势</h3>
        <div class="chart" id="trendChart"></div>
    </div>
    <div class="chart-box">
        <h3>😊 情绪分布</h3>
        <div class="chart" id="sentimentChart"></div>
    </div>
    <div class="chart-box">
        <h3>📂 分类分布</h3>
        <div class="chart" id="categoryChart"></div>
    </div>
    <div class="chart-box">
        <h3>⭐ 重要性分布</h3>
        <div class="chart" id="importanceChart"></div>
    </div>
</div>

<div class="news-section">
    <div class="section-header">
        <h3>📰 最新新闻</h3>
        <a href="/" class="view-all">查看全部 ›</a>
    </div>
    <div class="news-grid" id="newsList">
        <div class="news-card">
            <div class="news-indicator low"></div>
            <div class="news-content">
                <div class="news-title">加载中...</div>
                <div class="news-meta">
                    <span class="news-source">-</span>
                    <span class="news-time">-</span>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="footer">FinFeed 实时财经新闻监控系统 | 数据每 30 秒自动刷新</div>

<script>
let sourceChart, trendChart, sentimentChart, categoryChart, importanceChart;
let lastData = null;

function getTheme() {
    try { return document.documentElement.getAttribute('data-theme') || 'dark'; }
    catch(e) { return 'dark'; }
}

function getThemeColors() {
    const t = getTheme();
    if (t === 'light') {
        return {
            axis: '#7a8298',
            split: 'rgba(37,99,235,0.08)',
            barGrad1: '#2563eb',
            barGrad2: '#1d4ed8',
            line: '#16a34a',
            lineArea1: 'rgba(22,163,74,0.25)',
            lineArea2: 'rgba(22,163,74,0)',
            pos: '#16a34a',
            neu: '#ea580c',
            neg: '#dc2626',
            pieColors: ['#2563eb','#16a34a','#ea580c','#db2777','#9333ea','#0891b2','#f97316','#3b82f6'],
            impColors: ['#dc2626','#ea580c','#ca8a04','#3b82f6','#94a3b8'],
            kwGrad1: '#db2777',
            kwGrad2: '#9333ea',
            labelEmphasis: '#1a1d23'
        };
    }
    return {
        axis: '#6e7681',
        split: 'rgba(88,166,255,0.08)',
        barGrad1: '#58a6ff',
        barGrad2: '#1d4ed8',
        line: '#3fb950',
        lineArea1: 'rgba(63,185,80,0.25)',
        lineArea2: 'rgba(63,185,80,0)',
        pos: '#3fb950',
        neu: '#d29922',
        neg: '#f85149',
        pieColors: ['#58a6ff','#3fb950','#d29922','#bc8cff','#9333ea','#66ffcc','#ff9966','#6699ff'],
        impColors: ['#f85149','#d29922','#ffdd33','#66ccff','#99aabb'],
        kwGrad1: '#bc8cff',
        kwGrad2: '#9333ea',
        labelEmphasis: '#fff'
    };
}

function setTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    const btn = document.getElementById('theme-btn');
    btn.innerHTML = t === 'dark' ? '\u2600' : '\u263E';
    btn.title = t === 'dark' ? '切换到亮色主题' : '切换到暗色主题';
    try { localStorage.setItem('finfeed_theme', t); } catch(e) {}
    if (sourceChart) {
        sourceChart.dispose();
        trendChart.dispose();
        sentimentChart.dispose();
        categoryChart.dispose();
        importanceChart.dispose();
    }
    initCharts();
    if (lastData) updateCharts(lastData);
}

function toggleTheme() {
    setTheme(getTheme() === 'dark' ? 'light' : 'dark');
}

function updateFullscreenBtn() {
    const btn = document.querySelector('.fullscreen-btn');
    if (btn) {
        if (document.fullscreenElement) {
            btn.innerHTML = '\u26F6\uFE0F 退出全屏';
            btn.title = '退出全屏';
        } else {
            btn.innerHTML = '\u1F50D\uFE0F 全屏';
            btn.title = '全屏显示';
        }
    }
}

function toggleFullscreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(e => {});
    } else {
        document.exitFullscreen().catch(e => {});
    }
}

document.addEventListener('fullscreenchange', () => {
    updateFullscreenBtn();
    setTimeout(() => {
        if (sourceChart) sourceChart.resize();
        if (trendChart) trendChart.resize();
        if (sentimentChart) sentimentChart.resize();
        if (categoryChart) categoryChart.resize();
        if (importanceChart) importanceChart.resize();
    }, 100);
});

updateFullscreenBtn();

try {
    const saved = localStorage.getItem('finfeed_theme');
    if (saved) setTheme(saved);
} catch(e) {}

function initCharts() {
    sourceChart = echarts.init(document.getElementById('sourceChart'));
    trendChart = echarts.init(document.getElementById('trendChart'));
    sentimentChart = echarts.init(document.getElementById('sentimentChart'));
    categoryChart = echarts.init(document.getElementById('categoryChart'));
    importanceChart = echarts.init(document.getElementById('importanceChart'));

    window.addEventListener('resize', () => {
        sourceChart.resize();
        trendChart.resize();
        sentimentChart.resize();
        categoryChart.resize();
        importanceChart.resize();
    });
}

function updateCharts(data) {
    lastData = data;
    const c = getThemeColors();

    document.getElementById('totalNews').textContent = data.total_news.toLocaleString();
    document.getElementById('total24h').textContent = data.total_24h.toLocaleString();
    document.getElementById('sourceCount').textContent = data.source_count;

    const total = data.sentiment_stats.positive + data.sentiment_stats.negative + data.sentiment_stats.neutral;
    const posRate = total > 0 ? ((data.sentiment_stats.positive / total) * 100).toFixed(1) + '%' : '-';
    document.getElementById('posRate').textContent = posRate;

    document.getElementById('updateTime').textContent = '更新时间: ' + data.update_time;

    if (data.total_change !== undefined) {
        const tc = document.getElementById('totalChange');
        tc.textContent = data.total_change >= 0 ? '+' + data.total_change : data.total_change;
        tc.className = 'change ' + (data.total_change >= 0 ? 'up' : 'down');
    }
    if (data.hourly_change !== undefined) {
        const hc = document.getElementById('hourlyChange');
        hc.textContent = data.hourly_change >= 0 ? '+' + data.hourly_change : data.hourly_change;
        hc.className = 'change ' + (data.hourly_change >= 0 ? 'up' : 'down');
    }

    const sourceData = Object.entries(data.source_stats)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 10)
        .map(([name, value]) => ({ name, value }));

    sourceChart.setOption({
        tooltip: { trigger: 'item' },
        grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
        xAxis: { type: 'value', axisLabel: { color: c.axis }, splitLine: { lineStyle: { color: c.split } } },
        yAxis: { type: 'category', data: sourceData.map(d => d.name).reverse(), axisLabel: { color: c.axis } },
        series: [{
            type: 'bar',
            data: sourceData.map(d => d.value).reverse(),
            itemStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                    { offset: 0, color: c.barGrad1 },
                    { offset: 1, color: c.barGrad2 }
                ])
            },
            barWidth: '60%'
        }]
    });

    trendChart.setOption({
        tooltip: { trigger: 'axis' },
        grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
        xAxis: { type: 'category', data: data.time_trend.map(d => d.time), axisLabel: { color: c.axis } },
        yAxis: { type: 'value', axisLabel: { color: c.axis }, splitLine: { lineStyle: { color: c.split } } },
        series: [{
            type: 'line',
            data: data.time_trend.map(d => d.count),
            smooth: true,
            lineStyle: { color: c.line, width: 2 },
            areaStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                    { offset: 0, color: c.lineArea1 },
                    { offset: 1, color: c.lineArea2 }
                ])
            },
            itemStyle: { color: c.line }
        }]
    });

    const sentimentData = [
        { name: '正面', value: data.sentiment_stats.positive, itemStyle: { color: c.pos } },
        { name: '中性', value: data.sentiment_stats.neutral, itemStyle: { color: c.neu } },
        { name: '负面', value: data.sentiment_stats.negative, itemStyle: { color: c.neg } }
    ];
    sentimentChart.setOption({
        tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
        legend: { bottom: 0, textStyle: { color: c.axis } },
        series: [{
            type: 'pie',
            radius: ['40%', '70%'],
            center: ['50%', '45%'],
            avoidLabelOverlap: false,
            label: { show: false },
            emphasis: {
                label: { show: true, fontSize: 16, fontWeight: 'bold', color: c.labelEmphasis }
            },
            data: sentimentData
        }]
    });

    const catData = Object.entries(data.category_stats)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 8);
    categoryChart.setOption({
        tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
        legend: { type: 'scroll', bottom: 0, textStyle: { color: c.axis, fontSize: 11 } },
        series: [{
            type: 'pie',
            radius: ['35%', '65%'],
            center: ['50%', '42%'],
            data: catData.map(([name, value]) => ({ name, value })),
            label: { show: false }
        }],
        color: c.pieColors
    });

    const impData = data.importance_distribution;
    importanceChart.setOption({
        tooltip: { trigger: 'axis' },
        grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
        xAxis: {
            type: 'category',
            data: ['极重要', '重要', '一般', '较低', '低'],
            axisLabel: { color: c.axis }
        },
        yAxis: { type: 'value', axisLabel: { color: c.axis }, splitLine: { lineStyle: { color: c.split } } },
        series: [{
            type: 'bar',
            data: [impData['极重要'] || 0, impData['重要'] || 0, impData['一般'] || 0, impData['较低'] || 0, impData['低'] || 0],
            itemStyle: {
                color: function(params) {
                    return c.impColors[params.dataIndex];
                }
            },
            barWidth: '50%'
        }]
    });
}

function updateNewsList(news) {
    const container = document.getElementById('newsList');
    if (!news || news.length === 0) {
        container.innerHTML = `
            <div class="news-card">
                <div class="news-indicator low"></div>
                <div class="news-content">
                    <div class="news-title">暂无新闻</div>
                    <div class="news-meta">
                        <span class="news-source">-</span>
                        <span class="news-time">-</span>
                    </div>
                </div>
            </div>
        `;
        return;
    }

    function getImportanceLevel(imp) {
        if (typeof imp === 'number') {
            if (imp >= 0.7) return 'high';
            if (imp >= 0.4) return 'medium';
            return 'low';
        }
        const map = { '极重要': 'high', '重要': 'high', '一般': 'medium', '较低': 'low', '低': 'low' };
        return map[imp] || 'low';
    }

    container.innerHTML = news.map(item => {
        const impLevel = getImportanceLevel(item.importance);
        const category = item.category || '';
        return `
            <div class="news-card">
                <div class="news-indicator ${impLevel}"></div>
                <div class="news-content">
                    <div class="news-title">${item.title}</div>
                    <div class="news-meta">
                        <span class="news-source">${item.source}</span>
                        <span class="news-time">${item.publish_time}</span>
                        ${category ? `<span class="news-category">${category}</span>` : ''}
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

async function loadData() {
    try {
        const resp = await fetch('/api/stats');
        const data = await resp.json();
        updateCharts(data);

        const newsResp = await fetch('/api/news?limit=10');
        const newsData = await newsResp.json();
        updateNewsList(newsData.news || []);
    } catch (e) {
        console.error('加载数据失败:', e);
    }
}

initCharts();
loadData();
setInterval(loadData, 30000);
</script>
