<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FinFeed 实时财经新闻监控</title>
<style>
:root,[data-theme="light"]{
  --bg:#f5f6f8;--bg-card:#ffffff;--bg-card-alt:#f0f1f3;--bg-hover:#eceef1;
  --text:#1a1d23;--text2:#4a5060;--text3:#7a8298;
  --border:#dde0e6;--border2:#cfd3da;
  --accent:#2563eb;--accent-h:#1d4ed8;--accent-bg:rgba(37,99,235,.08);
  --green:#16a34a;--green-bg:rgba(22,163,74,.08);
  --red:#dc2626;--red-bg:rgba(220,38,38,.08);
  --orange:#ea580c;--orange-bg:rgba(234,88,12,.08);
  --purple:#9333ea;--purple-bg:rgba(147,51,234,.08);
  --shadow:0 1px 3px rgba(0,0,0,.06);--shadow-lg:0 4px 12px rgba(0,0,0,.1);
  --ease-out:cubic-bezier(0.16,1,0.3,1);
  --fs-xs:12px;--fs-sm:13px;--fs-base:15px;--fs-md:16px;--fs-lg:18px;--fs-xl:20px;
  --lh-base:1.7;
}
[data-theme="dark"]{
  --bg:#0d1117;--bg-card:#161b22;--bg-card-alt:#1c2128;--bg-hover:#1c2333;
  --text:#e6edf3;--text2:#9ba5b2;--text3:#6e7681;
  --border:#30363d;--border2:#484f58;
  --accent:#58a6ff;--accent-h:#79c0ff;--accent-bg:rgba(88,166,255,.1);
  --green:#3fb950;--green-bg:rgba(63,185,80,.1);
  --red:#f85149;--red-bg:rgba(248,81,73,.1);
  --orange:#d29922;--orange-bg:rgba(210,153,34,.1);
  --purple:#bc8cff;--purple-bg:rgba(188,140,255,.1);
  --shadow:0 1px 3px rgba(0,0,0,.3);--shadow-lg:0 4px 12px rgba(0,0,0,.4);
  --ease-out:cubic-bezier(0.16,1,0.3,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);
  color:var(--text);
  font-family:"Microsoft YaHei","PingFang SC","Hiragino Sans GB","Noto Sans CJK SC","Source Han Sans CN","WenQuanYi Micro Hei",Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  padding:18px;
  font-size:var(--fs-base);
  line-height:var(--lh-base);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
  transition:background .3s,color .3s;
}

.header{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:10px 16px;margin-bottom:16px;box-shadow:var(--shadow)}
.header-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.header h1{color:var(--accent);font-size:var(--fs-lg);font-weight:700;letter-spacing:-.3px;white-space:nowrap;display:flex;align-items:center;gap:8px;flex-shrink:0}
.header h1 .sub{color:var(--text3);font-size:var(--fs-xs);font-weight:400;white-space:nowrap}

.toolbar{display:flex;align-items:center;gap:10px;flex-shrink:0}
.toolbar .sep{width:1px;height:22px;background:var(--border);flex-shrink:0}

.search-box{position:relative;display:flex;align-items:center}
.search-box input{
  background:var(--bg-card-alt);
  color:var(--text);
  border:1px solid var(--border);
  padding:6px 30px 6px 28px;
  border-radius:8px;
  font-size:var(--fs-xs);
  font-family:inherit;
  width:170px;
  transition:border-color .2s,box-shadow .2s;
}
.search-box input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.search-box .ico{position:absolute;left:12px;color:var(--text3);font-size:var(--fs-md);pointer-events:none}
.search-clear{position:absolute;right:8px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;width:24px;height:24px;border-radius:50%;display:none;align-items:center;justify-content:center;transition:all .15s;line-height:1}
.search-clear:hover{background:var(--border);color:var(--text)}
.search-clear.show{display:flex}

.export-bar{display:flex;gap:4px;align-items:center}
.export-bar select{background:var(--bg-card-alt);color:var(--text);border:1px solid var(--border);padding:5px 8px;border-radius:6px;font-size:var(--fs-xs);font-family:inherit;cursor:pointer}
.export-bar select:focus{outline:none;border-color:var(--accent)}
.export-bar .btn{background:var(--accent);color:#fff;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:var(--fs-xs);font-weight:500;white-space:nowrap;transition:all .2s;font-family:inherit}
.export-bar .btn:hover{opacity:.85;transform:translateY(-1px)}
.export-bar .btn-secondary{background:var(--bg-card-alt);color:var(--text);border:1px solid var(--border)}
.export-bar .btn-secondary:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}

.theme-toggle{background:var(--bg-card-alt);color:var(--text2);border:1px solid var(--border);width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.theme-toggle:hover{border-color:var(--accent);color:var(--accent);transform:rotate(15deg)}

.stats{display:flex;gap:14px;flex-wrap:nowrap;color:var(--text2);font-size:var(--fs-xs);margin-left:auto;flex-shrink:0;white-space:nowrap}
.stats .item{display:flex;align-items:center;gap:4px}
.stats .val{color:var(--accent);font-weight:600;font-variant-numeric:tabular-nums;font-size:var(--fs-xs)}
.stats .new{color:var(--green)}
.stats .status-ok{color:var(--green)}
.stats .status-warn{color:var(--orange)}

.dp-wrap{position:relative}
.dp-trigger{display:flex;align-items:center;gap:5px;cursor:pointer;padding:6px 10px;background:var(--bg-card-alt);border:1px solid var(--border);border-radius:6px;transition:all .2s;user-select:none;white-space:nowrap;font-size:var(--fs-xs)}
.dp-trigger:hover{border-color:var(--accent)}
.dp-trigger.open{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-bg)}
.dp-trigger .ico{font-size:13px;line-height:1}
.dp-trigger .txt{font-size:var(--fs-xs);color:var(--text2)}
.dp-trigger .txt.on{color:var(--accent);font-weight:500}
.dp-reset{background:none;color:var(--text3);border:1px solid var(--border);padding:4px 8px;border-radius:5px;cursor:pointer;font-size:var(--fs-xs);transition:all .2s;white-space:nowrap;font-family:inherit}
.dp-reset:hover{border-color:var(--red);color:var(--red);background:var(--red-bg)}
.dp-cal{display:none;position:absolute;top:calc(100% + 8px);right:0;width:320px;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:18px;z-index:200;box-shadow:var(--shadow-lg);animation:dpIn .15s var(--ease-out)}
@keyframes dpIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.dp-cal.open{display:block}
.dp-cal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.dp-cal-title{font-size:var(--fs-md);font-weight:600;color:var(--text);letter-spacing:-.2px}
.dp-cal-nav{background:var(--bg-card-alt);color:var(--text2);border:1px solid var(--border);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:18px;font-weight:300;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1}
.dp-cal-nav:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.dp-shortcuts{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.dp-shortcut{background:var(--bg-card-alt);color:var(--text2);border:1px solid var(--border);padding:4px 10px;border-radius:12px;cursor:pointer;font-size:var(--fs-xs);transition:all .15s;font-family:inherit}
.dp-shortcut:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.dp-shortcut.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.dp-weekdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.dp-wd{text-align:center;font-size:var(--fs-xs);color:var(--text3);font-weight:600;padding:6px 0;letter-spacing:.3px}
.dp-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.dp-cell{height:40px;display:flex;align-items:center;justify-content:center;font-size:var(--fs-sm);border-radius:50%;cursor:pointer;transition:all .15s;color:var(--text);position:relative}
.dp-cell:hover:not(.dis):not(.oth){background:var(--accent-bg);color:var(--accent)}
.dp-cell.oth{color:var(--text3);opacity:.3;cursor:default;pointer-events:none}
.dp-cell.dis{color:var(--text3);opacity:.25;cursor:not-allowed;pointer-events:none;text-decoration:line-through}
.dp-cell.in-range{background:var(--accent-bg);border-radius:2px}
.dp-cell.rs{background:var(--accent);color:#fff;font-weight:600;border-radius:50% 2px 2px 50%}
.dp-cell.re{background:var(--accent);color:#fff;font-weight:600;border-radius:2px 50% 50% 2px}
.dp-cell.rs.re{border-radius:50%}
.dp-cell.today:not(.rs):not(.re){font-weight:700;box-shadow:inset 0 0 0 1.5px var(--accent)}
.dp-cell.pick-s:not(.rs){background:var(--accent);color:#fff;font-weight:600;border-radius:50% 2px 2px 50%}
.dp-hint{font-size:var(--fs-xs);color:var(--text3);margin-top:12px;padding-top:10px;border-top:1px solid var(--border);text-align:center}
.dp-hint b{color:var(--accent);font-weight:500}

.filters{margin:14px 0;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filters .label{color:var(--text2);font-size:var(--fs-sm);font-weight:500;margin-right:4px}
.filters button{background:var(--bg-card);color:var(--text2);border:1px solid var(--border);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:var(--fs-sm);transition:all .2s;outline:none;font-family:inherit}
.filters button:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px)}
.filters button.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 8px var(--accent-bg)}
.filters button:active{transform:scale(.96)}

.content-grid{display:grid;grid-template-columns:1fr 320px;gap:16px}

table{width:100%;border-collapse:separate;border-spacing:0;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}
thead th{background:var(--bg-card-alt);color:var(--text);padding:12px 16px;text-align:left;position:sticky;top:0;border-bottom:2px solid var(--border);font-weight:600;font-size:var(--fs-sm);z-index:1;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg-hover)}
tbody tr.row-new{animation:newRow 1s ease-out}
@keyframes newRow{0%{background:var(--green-bg)}100%{background:transparent}}
tbody td{padding:12px 16px;vertical-align:middle}

.col-importance{width:64px;padding:0 !important;text-align:center}
.imp-badge{display:inline-flex;align-items:center;justify-content:center;padding:3px 8px;border-radius:6px;font-size:var(--fs-xs);font-weight:600;color:#fff;white-space:nowrap;line-height:1.4}
.imp-veryhigh{background:var(--red);box-shadow:0 2px 8px var(--red-bg)}
.imp-high{background:var(--orange);box-shadow:0 2px 8px var(--orange-bg)}
.imp-medium{background:var(--accent);box-shadow:0 2px 8px var(--accent-bg)}
.imp-low{background:var(--text3);opacity:.75}

.col-time{color:var(--text3);width:160px;white-space:nowrap;font-size:var(--fs-sm);font-variant-numeric:tabular-nums}
.col-source{width:100px;font-size:var(--fs-sm);min-width:100px}
.col-source .src-tag{padding:3px 10px;border-radius:12px;font-size:var(--fs-xs);font-weight:500;display:inline-block;white-space:nowrap;border:1px solid transparent}
.col-title{max-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;position:relative}
.col-title a{color:var(--text);text-decoration:none;transition:color .15s;font-weight:500}
.col-title a:hover{color:var(--accent);text-decoration:underline;text-underline-offset:2px}
.col-title mark{background:var(--orange-bg);color:var(--orange);padding:0 3px;border-radius:2px;font-weight:600}

.sentiment-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:10px;vertical-align:middle;flex-shrink:0}
.sentiment-positive{background:var(--green);box-shadow:0 0 8px var(--green-bg)}
.sentiment-negative{background:var(--red);box-shadow:0 0 8px var(--red-bg)}
.sentiment-neutral{background:var(--text3)}



.empty{text-align:center;padding:70px 20px;color:var(--text3)}
.empty .ico{font-size:52px;margin-bottom:14px;opacity:.4}
.empty .title{font-size:var(--fs-md);font-weight:500;color:var(--text2);margin-bottom:8px}
.empty .desc{font-size:var(--fs-sm);color:var(--text3);margin-bottom:14px}
.empty .action{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent);padding:8px 20px;border-radius:8px;cursor:pointer;font-size:var(--fs-sm);font-family:inherit;transition:all .2s}
.empty .action:hover{background:var(--accent);color:#fff}

.skeleton-row{height:48px}
.skeleton-cell{height:18px;border-radius:4px;background:linear-gradient(90deg,var(--bg-card-alt) 25%,var(--bg-hover) 50%,var(--bg-card-alt) 75%);background-size:200% 100%;animation:skeleton 1.2s infinite}
@keyframes skeleton{0%{background-position:200% 0}100%{background-position:-200% 0}}

.sidebar{display:flex;flex-direction:column;gap:16px}
.side-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--shadow);transition:box-shadow .2s}
.side-card:hover{box-shadow:var(--shadow-lg)}
.side-card h3{font-size:var(--fs-sm);font-weight:600;color:var(--text);margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}

.stats-block .stat-row{display:flex;justify-content:space-between;padding:8px 0;font-size:var(--fs-sm);align-items:center}
.stats-block .stat-label{color:var(--text2);display:flex;align-items:center;gap:6px}
.stats-block .stat-val{color:var(--text);font-weight:600;font-variant-numeric:tabular-nums;transition:all .3s}

.load-more-wrap{text-align:center;padding:20px 0}
.load-more-btn{background:var(--bg-card);border:1px solid var(--border);color:var(--text);padding:10px 28px;border-radius:10px;cursor:pointer;font-size:var(--fs-sm);font-family:inherit;transition:all .2s}
.load-more-btn:hover{background:var(--bg-card-alt);border-color:var(--accent);color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 12px var(--accent-bg)}
.load-more-btn:active{transform:scale(.97)}

.toast-container{position:fixed;top:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:12px;min-width:300px;max-width:420px;animation:toastIn .3s var(--ease-out);pointer-events:auto;border-left:4px solid var(--accent)}
.toast.success{border-left-color:var(--green)}
.toast.error{border-left-color:var(--red)}
.toast.warning{border-left-color:var(--orange)}
.toast .toast-icon{font-size:20px;flex-shrink:0}
.toast .toast-content{flex:1}
.toast .toast-title{font-size:var(--fs-sm);font-weight:600;color:var(--text);margin-bottom:2px}
.toast .toast-msg{font-size:var(--fs-xs);color:var(--text2);line-height:1.5}
.toast .toast-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:2px;opacity:.6;transition:opacity .15s;line-height:1}
.toast .toast-close:hover{opacity:1}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
.toast.toast-out{animation:toastOut .25s var(--ease-out) forwards}
@keyframes toastOut{to{opacity:0;transform:translateX(40px)}}

@media(max-width:1024px){
  .content-grid{grid-template-columns:1fr}
  .sidebar{display:none}
  .header-row{flex-wrap:wrap;gap:8px}
  .stats{margin-left:0}
}
@media(max-width:768px){
  body{padding:10px;font-size:var(--fs-sm);--fs-base:14px}
  .header{padding:10px 12px}
  .header-row{gap:8px;flex-wrap:wrap}
  .header h1{font-size:var(--fs-md);margin-right:0}
  .toolbar{gap:6px}
  .search-box input{width:140px}
  .stats{gap:10px;font-size:11px;margin-left:0;flex-wrap:wrap}
  .filters{gap:6px}
  .filters button{padding:5px 12px;font-size:var(--fs-xs)}
  table{font-size:var(--fs-sm)}
  thead th{padding:10px 12px;font-size:var(--fs-xs)}
  tbody td{padding:10px 12px}
  .col-time{width:auto;font-size:var(--fs-xs)}
  .col-source{width:80px;min-width:80px}
  .col-source .src-tag{padding:2px 8px;font-size:var(--fs-xs);white-space:nowrap}
  .col-importance{width:56px}
  .imp-badge{padding:2px 6px;font-size:11px}
  .dp-cal{width:calc(100vw - 40px);right:auto;left:0}
  .toast-container{left:10px;right:10px;top:10px}
  .toast{min-width:auto}
}
@media(max-width:480px){
  .search-box input{width:120px}
  .toolbar .sep{display:none}
  .export-bar .btn, .export-bar select{font-size:11px}
  thead th:nth-child(2),.col-time{display:none}
  .col-source{width:60px;min-width:60px}
  .col-source .src-tag{white-space:nowrap;font-size:10px;padding:2px 5px}
  .stats .item{font-size:10px;gap:2px}
  .col-importance{width:48px}
  .imp-badge{padding:2px 5px;font-size:10px}
}
</style>
</head>
<body>
<div class="toast-container" id="toast-container"></div>

<div class="header">
<div class="header-row">
<h1>&#9608; FinFeed<span class="sub" id="update-time"></span></h1>
<div class="toolbar">
<div class="search-box">
<span class="ico">&#128269;</span>
<input type="text" id="search-input" placeholder="搜索新闻..." onkeyup="onSearchKey(event)" oninput="toggleSearchClear()">
<button class="search-clear" id="search-clear" onclick="clearSearch()" title="清除搜索">&#10005;</button>
</div>
<div class="sep"></div>
<div class="export-bar">
<select id="export-format">
<option value="json">JSON</option>
<option value="csv">CSV</option>
</select>
<button class="btn" onclick="doExport()">&#128229; 导出</button>
<button class="btn btn-secondary" onclick="goDashboard()">&#128202; 大屏</button>
</div>
<div class="sep"></div>
<div class="dp-wrap" id="dp-wrap">
<div class="dp-trigger" id="dp-trigger" onclick="toggleCal()">
<span class="ico">&#128197;</span>
<span class="txt" id="dp-text">日期范围</span>
</div>
<div class="dp-cal" id="dp-cal">
<div class="dp-cal-head">
<button class="dp-cal-nav" onclick="calNav(-1)">&#8249;</button>
<span class="dp-cal-title" id="dp-cal-title"></span>
<button class="dp-cal-nav" onclick="calNav(1)">&#8250;</button>
</div>
<div class="dp-shortcuts" id="dp-shortcuts"></div>
<div class="dp-weekdays"><span class="dp-wd">一</span><span class="dp-wd">二</span><span class="dp-wd">三</span><span class="dp-wd">四</span><span class="dp-wd">五</span><span class="dp-wd">六</span><span class="dp-wd">日</span></div>
<div class="dp-grid" id="dp-grid"></div>
<div class="dp-hint" id="dp-hint">点击选择开始日期</div>
</div>
</div>
<button class="dp-reset" id="dp-reset" onclick="resetRange()" style="display:none">重置</button>
</div>
<div class="stats">
<div class="item">&#128337;<span id="cycle">0</span>轮</div>
<div class="item">&#128202;<span class="val" id="total">0</span></div>
<div class="item new">&#10133;<span class="val" id="new-count">0</span></div>
<div class="item">&#128240;<span id="status" class="status-ok">启动中</span></div>
<div class="item">&#128193;<span id="filter-count">0</span>条</div>
</div>
<button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" title="切换主题">&#9790;</button>
</div>
</div>

<div class="filters" id="filters"><span class="label">来源:</span><button class="active" data-source="all">全部</button></div>

<div class="content-grid">
<div>
<table>
<thead><tr>
<th style="width:64px;text-align:center">重要性</th>
<th style="width:160px">时间</th>
<th style="width:100px">来源</th>
<th>标题</th>
</tr></thead>
<tbody id="news-body"></tbody>
</table>
<div class="load-more-wrap">
  <button id="load-more" class="load-more-btn" style="display:none" onclick="loadMore()">加载更多</button>
</div>
</div>

<div class="sidebar">
<div class="side-card stats-block">
<h3>&#128202; 数据统计</h3>
<div class="stat-row"><span class="stat-label">新闻总数</span><span class="stat-val" id="stat-total">0</span></div>
<div class="stat-row"><span class="stat-label">24小时新增</span><span class="stat-val" id="stat-24h">0</span></div>
<div class="stat-row"><span class="stat-label">来源数量</span><span class="stat-val" id="stat-sources">0</span></div>
</div>
<div class="side-card stats-block">
<h3>&#128522; 情绪分布</h3>
<div class="stat-row"><span class="stat-label"><span style="color:var(--green)">●</span> 正面</span><span class="stat-val" id="stat-pos">0</span></div>
<div class="stat-row"><span class="stat-label"><span style="color:var(--text3)">●</span> 中性</span><span class="stat-val" id="stat-neu">0</span></div>
<div class="stat-row"><span class="stat-label"><span style="color:var(--red)">●</span> 负面</span><span class="stat-val" id="stat-neg">0</span></div>
</div>
</div>
</div>

<script>
var SOURCE_COLORS={
  "新浪财经":"#55aaff","财联社":"#ff3b30","同花顺":"#e74c3c","同花顺原创":"#e74c3c",
  "东方财富":"#ff9500","华尔街见闻":"#00d4ff","金十数据":"#d4a017","格隆汇":"#68af00",
  "格隆汇文章":"#68af00","格隆汇快讯":"#68af00","雪球":"#0066ff","法布财经":"#00a0e9",
  "巨潮公告":"#ff6600","雅虎财经":"#888888","21经济网":"#0078ff","企查查":"#aa66ff",
  "cnBeta":"#00b0ff"
};
var allNews=[],prevNewsIds=new Set(),activeSource='all',serverOffset=0,searchMode=false,searchResults=[];
var rangeStart='',rangeEnd='',availDates=new Set();
var pickState='start',calYear=0,calMonth=0,calMinDate='',calMaxDate='',calOpen=false;
var currentSearchKeyword='';
var displayLimit=500;
var isFirstLoad=true;

/* ---- Toast ---- */
function showToast(msg,type,title,duration){
  type=type||'info';duration=duration||3000;
  var icons={success:'&#10004;',error:'&#10008;',warning:'&#9888;',info:'&#128712;'};
  var c=document.getElementById('toast-container');
  var t=document.createElement('div');
  t.className='toast '+type;
  t.innerHTML='<span class="toast-icon">'+icons[type]+'</span>'+
    '<div class="toast-content">'+
      (title?'<div class="toast-title">'+esc(title)+'</div>':'')+
      '<div class="toast-msg">'+esc(msg)+'</div>'+
    '</div>'+
    '<button class="toast-close" onclick="this.parentElement.classList.add(\'toast-out\');setTimeout(function(){t.remove()},250)">&times;</button>';
  c.appendChild(t);
  setTimeout(function(){t.classList.add('toast-out');setTimeout(function(){t.remove()},250)},duration);
}

/* ---- Theme ---- */
function getTheme(){try{return document.documentElement.getAttribute('data-theme')||'light'}catch(e){return'light'}}
function setTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  var btn=document.getElementById('theme-btn');
  btn.innerHTML=t==='dark'?'\u2600':'\u263E';
  btn.title=t==='dark'?'切换到亮色主题':'切换到暗色主题';
  try{localStorage.setItem('finfeed_theme',t)}catch(e){}
}
function toggleTheme(){setTheme(getTheme()==='dark'?'light':'dark')}
try{var savedTheme=localStorage.getItem('finfeed_theme');if(savedTheme)setTheme(savedTheme)}catch(e){}

/* ---- Utils ---- */
function esc(s){var d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML}
function pad(n){return n<10?'0'+n:n}
function bjNow(){
  var now=new Date(Date.now()+serverOffset);
  return now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate())+' '+pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds())
}
setInterval(function(){document.getElementById('update-time').textContent=bjNow()},1000);

function getImpInfo(score){
  if(score>=8)return{cls:'imp-veryhigh',label:'极重要'};
  if(score>=6.5)return{cls:'imp-high',label:'重要'};
  if(score>=5)return{cls:'imp-medium',label:'一般'};
  return{cls:'imp-low',label:'较低'};
}
function getSentimentClass(s){
  if(s==='positive')return'sentiment-positive';
  if(s==='negative')return'sentiment-negative';
  return'sentiment-neutral';
}
function getSentimentTitle(s){
  if(s==='positive')return'正面情绪';
  if(s==='negative')return'负面情绪';
  return'中性情绪';
}
function getSourceStyle(source){
  var color=SOURCE_COLORS[source]||'#888888';
  return'background:'+color+'20;color:'+color+';border-color:'+color+'40';
}
function highlightText(text,keyword){
  if(!keyword)return esc(text);
  var safeKw=esc(keyword).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  var re=new RegExp('('+safeKw+')','gi');
  return esc(text).replace(re,'<mark>$1</mark>');
}
function animateNumber(el,target){
  var start=parseInt(el.textContent.replace(/,/g,''))||0;
  if(start===target)return;
  var diff=target-start;
  var duration=400;
  var startTime=performance.now();
  function step(now){
    var progress=Math.min((now-startTime)/duration,1);
    var eased=1-Math.pow(1-progress,3);
    var current=Math.round(start+diff*eased);
    el.textContent=current.toLocaleString();
    if(progress<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

/* ---- Search ---- */
var searchTimer=null;
function toggleSearchClear(){
  var input=document.getElementById('search-input');
  var btn=document.getElementById('search-clear');
  btn.classList.toggle('show',input.value.length>0);
}
function clearSearch(){
  document.getElementById('search-input').value='';
  toggleSearchClear();
  searchMode=false;searchResults=[];currentSearchKeyword='';
  render();
  document.getElementById('search-input').focus();
}
function onSearchKey(e){
  if(e.key==='Enter'){doSearch();return}
  if(e.key==='Escape'){clearSearch();return}
  clearTimeout(searchTimer);
  searchTimer=setTimeout(doSearch,300);
}
async function doSearch(){
  var q=document.getElementById('search-input').value.trim();
  currentSearchKeyword=q;
  toggleSearchClear();
  if(!q){searchMode=false;searchResults=[];render();return}
  try{
    var r=await fetch('/api/search?q='+encodeURIComponent(q)+'&limit=200');
    if(!r.ok)throw new Error('搜索请求失败');
    var d=await r.json();
    searchResults=d.news||[];
    searchMode=true;
    render();
    if(searchResults.length===0){
      showToast('未找到与"'+q+'"相关的新闻','warning','搜索结果',2500);
    }
  }catch(e){
    showToast('搜索失败: '+e.message,'error');
  }
}

/* ---- Skeleton ---- */
function renderSkeleton(){
  var tb=document.getElementById('news-body');
  var rows='';
  for(var i=0;i<8;i++){
    rows+='<tr class="skeleton-row"><td><div class="skeleton-cell" style="width:40px;height:20px;border-radius:6px;margin:0 auto"></div></td>'+
      '<td><div class="skeleton-cell" style="width:130px"></div></td>'+
      '<td><div class="skeleton-cell" style="width:60px"></div></td>'+
      '<td><div class="skeleton-cell" style="width:'+(60+Math.random()*30)+'%"></div></td>'+
      '<td></td></tr>';
  }
  tb.innerHTML=rows;
}

/* ---- Load Data ---- */
async function load(){
  try{
    if(isFirstLoad)renderSkeleton();
    var r=await fetch('/api/news');
    if(!r.ok)throw new Error('HTTP '+r.status);
    var d=await r.json();
    if(d.server_ts){serverOffset=(d.server_ts*1000)-Date.now()}
    
    var newIds=new Set();
    (d.news||[]).forEach(function(n){newIds.add(n.id)});
    var hasNew=false;
    if(!isFirstLoad&&prevNewsIds.size>0){
      d.news.forEach(function(n){if(!prevNewsIds.has(n.id))hasNew=true});
    }
    prevNewsIds=newIds;
    
    document.getElementById('cycle').textContent=d.cycle;
    animateNumber(document.getElementById('total'),d.total);
    document.getElementById('new-count').textContent=d.new_count;
    document.getElementById('status').textContent=d.status;
    document.getElementById('status').className=d.status&&(d.status.indexOf('失败')>-1||d.status.indexOf('错误')>-1)?'status-warn':'status-ok';
    animateNumber(document.getElementById('stat-total'),d.total);
    document.getElementById('update-time').textContent=bjNow();
    
    if(!searchMode){
      allNews=d.news||[];
    }
    var sources=[];var seen={};
    allNews.forEach(function(n){if(!seen[n.source]){seen[n.source]=1;sources.push(n.source)}});
    (d.sources||[]).forEach(function(s){if(!seen[s]){seen[s]=1;sources.push(s)}});
    var fc=document.getElementById('filters');
    var cur=fc.querySelector('.active');
    var curSrc=cur?cur.dataset.source:'all';
    var btns='<span class="label">来源:</span><button class="'+(curSrc==='all'?'active':'')+'" data-source="all">全部</button>';
    sources.forEach(function(s){btns+='<button class="'+(curSrc===s?'active':'')+'" data-source="'+esc(s)+'">'+esc(s)+'</button>'});
    fc.innerHTML=btns;
    fc.querySelectorAll('button').forEach(function(b){b.onclick=function(){activeSource=b.dataset.source;fc.querySelectorAll('button').forEach(function(x){x.classList.remove('active')});b.classList.add('active');render()}});
    
    if(hasNew&&!isFirstLoad&&d.new_count>0){
      showToast('新增 '+d.new_count+' 条新闻','success',null,2000);
    }
    
    if(!searchMode)render(hasNew&&!isFirstLoad);
    loadStats();
    isFirstLoad=false;
  }catch(e){
    if(isFirstLoad){
      var tb=document.getElementById('news-body');
      tb.innerHTML='<tr><td colspan="5" class="empty"><div class="ico">&#9888;</div><div class="title">加载失败</div><div class="desc">'+esc(e.message)+'</div><button class="action" onclick="load()">重试</button></td></tr>';
      isFirstLoad=false;
    }
    showToast('数据加载失败: '+e.message,'error','网络错误',4000);
  }
}

async function loadStats(){
  try{
    var r=await fetch('/api/stats');
    if(!r.ok)return;
    var d=await r.json();
    animateNumber(document.getElementById('stat-24h'),d.total_24h);
    document.getElementById('stat-sources').textContent=d.source_count;
    animateNumber(document.getElementById('stat-pos'),d.sentiment_stats.positive);
    animateNumber(document.getElementById('stat-neu'),d.sentiment_stats.neutral);
    animateNumber(document.getElementById('stat-neg'),d.sentiment_stats.negative);
      }catch(e){}
}

function searchKeyword(kw){
  document.getElementById('search-input').value=kw;
  doSearch();
}

function render(highlightNew){
  var tb=document.getElementById('news-body');
  var news=searchMode?searchResults:allNews;
  var filtered=activeSource==='all'?news:news.filter(function(n){return n.source===activeSource});
  if(rangeStart&&rangeEnd){
    filtered=filtered.filter(function(n){
      var d=(n.publish_time||'').slice(0,10);
      return d>=rangeStart&&d<=rangeEnd;
    });
  }
  filtered.sort(function(a,b){
    var tsA=a.publish_ts||0;
    var tsB=b.publish_ts||0;
    if(tsB!==tsA)return tsB-tsA;
    return (b.id||0)-(a.id||0);
  });
  var totalEl=document.getElementById('total');
  var dbTotal=parseInt(totalEl.textContent.replace(/,/g,''))||0;
  var showCount=(activeSource==='all'&&!rangeStart&&!rangeEnd&&!searchMode)?dbTotal:filtered.length;
  document.getElementById('filter-count').textContent=showCount.toLocaleString();
  
  if(!filtered.length){
    var emptyTitle=searchMode?'未找到相关新闻':(rangeStart?'该日期范围内暂无数据':'暂无数据');
    var emptyDesc=searchMode?'尝试更换关键词或清除搜索':(rangeStart?'尝试调整日期范围':'请等待新闻抓取');
    var emptyAction=searchMode?'<button class="action" onclick="clearSearch()">清除搜索</button>':(rangeStart?'<button class="action" onclick="resetRange()">重置日期</button>':'');
    tb.innerHTML='<tr><td colspan="5" class="empty"><div class="ico">&#128240;</div><div class="title">'+emptyTitle+'</div><div class="desc">'+emptyDesc+'</div>'+emptyAction+'</td></tr>';
    document.getElementById('load-more').style.display='none';
    return
  }
  
  var existingIds={};
  tb.querySelectorAll('tr[data-id]').forEach(function(tr){existingIds[tr.dataset.id]=true});
  
  var displayCount=activeSource==='all'?Math.min(displayLimit,filtered.length):filtered.length;
  tb.innerHTML=filtered.slice(0,displayCount).map(function(n){
    var impInfo=getImpInfo(n.importance||0);
    var sentClass=getSentimentClass(n.sentiment);
    var sentTitle=getSentimentTitle(n.sentiment);
    var srcStyle=getSourceStyle(n.source);
    var isNew=highlightNew&&!existingIds[n.id];
    var titleDisplay=currentSearchKeyword?highlightText(n.title,currentSearchKeyword):esc(n.title);
    var linkHtml;
    if(n.url&&n.url!=='#'&&n.url.startsWith('http')){
      linkHtml='<a href="'+esc(n.url)+'" target="_blank" rel="noopener noreferrer" title="'+esc(n.title)+'">'+titleDisplay+'</a>';
    }else{
      linkHtml='<span title="'+esc(n.title)+'">'+titleDisplay+'</span>';
    }
    var rowClass=isNew?'row-new':'';
    return '<tr data-id="'+n.id+'" class="'+rowClass+'">'+
      '<td class="col-importance"><span class="imp-badge '+impInfo.cls+'" title="'+impInfo.label+' ('+(n.importance||0)+')">'+impInfo.label+'</span></td>'+
      '<td class="col-time">'+esc(n.publish_time||'')+'</td>'+
      '<td class="col-source"><span class="src-tag" style="'+srcStyle+'">'+esc(n.source)+'</span></td>'+
      '<td class="col-title"><span class="sentiment-dot '+sentClass+'" title="'+sentTitle+'"></span>'+linkHtml+'</td>'+
      '</tr>';
  }).join('');
  var loadMore=document.getElementById('load-more');
  if(displayCount<filtered.length){
    loadMore.style.display='block';
    loadMore.textContent='加载更多（已显示 '+displayCount+' / '+filtered.length+' 条）';
  }else{
    loadMore.style.display='none';
  }
}
function loadMore(){
  displayLimit+=500;
  render();
}
load();setInterval(load,5000);

/* ---- Calendar ---- */
function dateStr(y,m,d){return y+'-'+pad(m+1)+'-'+pad(d)}

function renderShortcuts(){
  var sc=document.getElementById('dp-shortcuts');
  var today=new Date();
  var todayS=dateStr(today.getFullYear(),today.getMonth(),today.getDate());
  var yesterday=new Date(today);yesterday.setDate(yesterday.getDate()-1);
  var yesterdayS=dateStr(yesterday.getFullYear(),yesterday.getMonth(),yesterday.getDate());
  var d7ago=new Date(today);d7ago.setDate(d7ago.getDate()-6);
  var d30ago=new Date(today);d30ago.setDate(d30ago.getDate()-29);
  
  var shortcuts=[
    {label:'今天',start:todayS,end:todayS},
    {label:'昨天',start:yesterdayS,end:yesterdayS},
    {label:'近7天',start:dateStr(d7ago.getFullYear(),d7ago.getMonth(),d7ago.getDate()),end:todayS},
    {label:'近30天',start:dateStr(d30ago.getFullYear(),d30ago.getMonth(),d30ago.getDate()),end:todayS}
  ];
  
  sc.innerHTML=shortcuts.map(function(s){
    var active=rangeStart===s.start&&rangeEnd===s.end?'active':'';
    return'<button class="dp-shortcut '+active+'" onclick="setRange(\''+s.start+'\',\''+s.end+'\')">'+s.label+'</button>';
  }).join('');
}
function setRange(start,end){
  rangeStart=start;rangeEnd=end;pickState='done';
  updateUI();renderCal();setTimeout(closeCal,200);render();
}

async function initCal(){
  renderShortcuts();
  try{
    var r=await fetch('/api/daterange');
    var d=await r.json();
    if(d.dates&&d.dates.length){
      d.dates.forEach(function(t){availDates.add(t)});
      calMinDate=d.min;calMaxDate=d.max;
      var today=new Date();
      calYear=today.getFullYear();
      calMonth=today.getMonth();
      renderCal();
    }
  }catch(e){
    var today=new Date();
    calYear=today.getFullYear();
    calMonth=today.getMonth();
  }
}

function toggleCal(){
  calOpen=!calOpen;
  var cal=document.getElementById('dp-cal');
  var trig=document.getElementById('dp-trigger');
  if(calOpen){cal.classList.add('open');trig.classList.add('open');renderCal()}
  else{cal.classList.remove('open');trig.classList.remove('open')}
}
function closeCal(){
  calOpen=false;
  document.getElementById('dp-cal').classList.remove('open');
  document.getElementById('dp-trigger').classList.remove('open');
}
function calNav(dir){
  calMonth+=dir;
  if(calMonth<0){calMonth=11;calYear--}
  if(calMonth>11){calMonth=0;calYear++}
  renderCal();
}

function renderCal(){
  renderShortcuts();
  var MN=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  document.getElementById('dp-cal-title').textContent=calYear+'年 '+MN[calMonth];
  var firstDay=new Date(calYear,calMonth,1).getDay();
  var offset=(firstDay+6)%7;
  var daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  var prevDays=new Date(calYear,calMonth,0).getDate();
  var today=new Date();
  var todayStr=dateStr(today.getFullYear(),today.getMonth(),today.getDate());
  var parts=[];
  var i,d,ds,cls;
  for(i=offset-1;i>=0;i--){
    parts.push('<div class="dp-cell oth">'+(prevDays-i)+'</div>');
  }
  for(d=1;d<=daysInMonth;d++){
    ds=dateStr(calYear,calMonth,d);
    cls=['dp-cell'];
    var has=availDates.has(ds);
    if(!has)cls.push('dis');
    if(ds===todayStr)cls.push('today');
    if(rangeStart&&rangeEnd){
      if(ds===rangeStart)cls.push('rs');
      if(ds===rangeEnd)cls.push('re');
      if(ds>rangeStart&&ds<rangeEnd)cls.push('in-range');
    }else if(rangeStart&&!rangeEnd&&ds===rangeStart){
      cls.push('pick-s');
    }
    parts.push('<div class="'+cls.join(' ')+'" data-d="'+ds+'">'+d+'</div>');
  }
  var total=offset+daysInMonth;
  var rem=(7-total%7)%7;
  for(i=1;i<=rem;i++){
    parts.push('<div class="dp-cell oth">'+i+'</div>');
  }
  var grid=document.getElementById('dp-grid');
  grid.innerHTML=parts.join('');
  grid.querySelectorAll('.dp-cell:not(.dis):not(.oth)').forEach(function(c){
    c.addEventListener('click',function(e){e.stopPropagation();onDayClick(c.dataset.d)});
  });
  var hint=document.getElementById('dp-hint');
  if(pickState==='start')hint.innerHTML='点击选择开始日期';
  else if(pickState==='end')hint.innerHTML='已选 <b>'+rangeStart+'</b>，继续选择截止日期';
  else hint.innerHTML='<b>'+rangeStart+' ~ '+rangeEnd+'</b>';
}

function onDayClick(ds){
  if(pickState==='start'){
    rangeStart=ds;rangeEnd='';pickState='end';
    updateUI();renderCal();
  }else if(pickState==='end'){
    if(ds<rangeStart){rangeStart=ds;pickState='end';updateUI();renderCal();return}
    rangeEnd=ds;pickState='done';updateUI();renderCal();setTimeout(closeCal,300);
    render();
  }else{
    rangeStart=ds;rangeEnd='';pickState='end';updateUI();renderCal();
  }
}

function updateUI(){
  var txt=document.getElementById('dp-text');
  var rst=document.getElementById('dp-reset');
  if(rangeStart&&rangeEnd){
    txt.textContent=rangeStart+' ~ '+rangeEnd;
    txt.className='txt on';
    rst.style.display='';
  }else if(rangeStart){
    txt.textContent='起 '+rangeStart;
    txt.className='txt';
    rst.style.display='';
  }else{
    txt.textContent='日期范围';
    txt.className='txt';
    rst.style.display='none';
  }
}

function resetRange(){
  rangeStart='';rangeEnd='';pickState='start';
  updateUI();closeCal();
  render();
}

document.addEventListener('click',function(e){
  var wrap=document.getElementById('dp-wrap');
  if(wrap&&!wrap.contains(e.target))closeCal();
});

initCal();

/* ---- Export & Dashboard ---- */
function doExport(){
  var fmt=document.getElementById('export-format').value;
  var url='/api/export?format='+fmt;
  if(rangeStart)url+='&start='+rangeStart;
  if(rangeEnd)url+='&end='+rangeEnd;
  window.open(url,'_blank');
  showToast('正在导出 '+fmt.toUpperCase()+' 文件...','info','导出',1500);
}
function goDashboard(){window.open('/dashboard','_blank')}

document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){closeCal();clearSearch()}
  if(e.key==='/'&&document.activeElement.tagName!=='INPUT'){e.preventDefault();document.getElementById('search-input').focus()}
});
</script>
